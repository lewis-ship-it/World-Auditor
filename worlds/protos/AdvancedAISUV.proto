#VRML_SIM R2025a utf8

EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/vehicles/protos/abstract/AckermannVehicle.proto"

PROTO AdvancedAISUV [
  field SFVec3f    translation 0 0 0.4
  field SFRotation rotation    0 0 1 0
  field SFString   name        "AdvancedAISUV"
  field SFString   controller  "<none>"

  field SFFloat wheelbase 3.2
  field SFFloat trackFront 2.2
  field SFFloat trackRear  2.2
]
{
  AckermannVehicle {
    translation IS translation
    rotation IS rotation
    name IS name
    controller IS controller

    wheelbase IS wheelbase
    trackFront IS trackFront
    trackRear IS trackRear

    # ✅ CRITICAL: PHYSICS BODY (fixes sinking + joint errors)
    boundingObject Box {
      size 4.5 2.0 1.3
    }

    physics Physics {
      mass 1800
    }

    # ✅ FIXED WHEEL SIZE (prevents sinking)
    wheelFrontLeft VehicleWheel {
      radius 0.5
      thickness 0.4
    }

    wheelFrontRight VehicleWheel {
      radius 0.5
      thickness 0.4
    }

    wheelRearLeft VehicleWheel {
      radius 0.5
      thickness 0.4
    }

    wheelRearRight VehicleWheel {
      radius 0.5
      thickness 0.4
    }

    # ✅ REAR DRIVE
    axisDevicesRearLeft [
      RotationalMotor {
        name "rear_left_motor"
        maxTorque 10000
      }
    ]

    axisDevicesRearRight [
      RotationalMotor {
        name "rear_right_motor"
        maxTorque 10000
      }
    ]

    # ✅ BODY (NON-PHYSICS → NO FLOATING)
    extensionSlot [
      Transform {
        translation 1.6 0 0.55

        children [

          Shape {
            appearance PBRAppearance {
              baseColor 0.05 0.05 0.08
              metalness 0.8
              roughness 0.3
            }
            geometry Box {
              size 4.2 2.0 1.5
            }
          }

          Transform {
            translation 0 0 0.9
            children [
              Shape {
                appearance PBRAppearance {
                  baseColor 0.1 0.1 0.12
                }
                geometry Box {
                  size 2.5 1.6 0.6
                }
              }
            ]
          }

          # ===== SENSORS =====

          Camera {
            name "front_camera"
            translation 2.2 0 0.4
            width 1280
            height 720
          }

          Camera {
            name "top_camera"
            translation 0 0 1.5
            rotation 1 0 0 -1.57
          }

          Lidar {
            name "lidar"
            translation 0 0 1.4
            horizontalResolution 720
            numberOfLayers 16
            fieldOfView 6.28
            maxRange 100
          }

          GPS { name "gps" }
          InertialUnit { name "imu" }

          DistanceSensor {
            name "ds_front"
            translation 2.3 0 0.2
          }

        ]
      }
    ]
  }
}